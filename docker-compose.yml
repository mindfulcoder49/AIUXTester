services:

  mariadb:
    image: mariadb:11.4
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: aiuxtester
      MARIADB_USER: aiuxtester
      MARIADB_PASSWORD: aiuxtester
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    ports:
      - "8001:8080"
    environment:
      PORT: "8080"
      DB_BACKEND: mariadb
      DATABASE_URL: mysql://aiuxtester:aiuxtester@mariadb:3306/aiuxtester
      QUEUE_MODE: redis
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-random-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python worker_main.py
    environment:
      DB_BACKEND: mariadb
      DATABASE_URL: mysql://aiuxtester:aiuxtester@mariadb:3306/aiuxtester
      QUEUE_MODE: redis
      REDIS_URL: redis://redis:6379/0
      BROWSER_PAGE_TIMEOUT_MS: ${BROWSER_PAGE_TIMEOUT_MS:-60000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Scale workers: docker compose up --scale worker=7

volumes:
  mariadb_data:
  redis_data:
