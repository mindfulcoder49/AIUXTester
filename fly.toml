app = "aiuxtester"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.vue"

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8080"
  worker = "python worker_main.py"

[env]
  PORT = "8080"
  UI_VARIANT = "vue"
  DB_BACKEND = "mariadb"
  DATABASE_URL = "mysql://aiuxtester:CHANGE_ME@db-internal.example:3306/aiuxtester"
  QUEUE_MODE = "redis"
  REDIS_URL = "redis://YOUR-REDIS-HOST:6379/0"
  ACCESS_TOKEN_EXPIRE_MINUTES = "30"
  REFRESH_TOKEN_EXPIRE_DAYS = "30"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  processes = ["app"]
  size = "shared-cpu-1x"
  memory = "256mb"

[[vm]]
  processes = ["worker"]
  size = "performance-1x"
  memory = "2gb"
